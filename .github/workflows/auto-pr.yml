name: Auto PR
on:
  push:
    branches:
      - feat/* # ou sua branch principal

jobs:
  pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Create Pull Request
        uses: repo-sync/pull-request@v2
        with:
          source_branch: "" # branch atual
          destination_branch: "main" # ou develop
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_title: "PR Automatico: ${{ github.ref }}"
          pr_body: "Criado automaticamente após push."
